<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfólio em vídeo de UN6107617.">
  <meta name="theme-color" content="#08030f">
  <title>UN6107617 | Portfólio de Vídeos</title>
  <style>
    :root { --ink: #08030f; --panel: #150a23; --purple: #a855f7; --violet: #6d28d9; --mist: #f5edff; --muted: #c4b5d8; }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; min-width: 320px; color: var(--mist); background: var(--ink); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body::before { content: ""; position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 74% 8%, #58208a66 0 1%, transparent 32%), radial-gradient(circle at 15% 90%, #37105f77 0, transparent 30%), #08030f; }
    body::after { content: ""; position: fixed; inset: 0; z-index: -1; opacity: .32; pointer-events: none; background-image: linear-gradient(#ffffff08 1px, transparent 1px), linear-gradient(90deg, #ffffff08 1px, transparent 1px); background-size: 44px 44px; mask-image: linear-gradient(to bottom, black, transparent 82%); }
    a { color: inherit; text-decoration: none; }
    .shell { width: min(1120px, calc(100% - 40px)); margin: 0 auto; }
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 22px 0; }
    .brand { font-weight: 900; letter-spacing: -.06em; font-size: 1.25rem; }
    .brand span { color: var(--purple); }
    .nav-links { display: flex; gap: 24px; color: var(--muted); font-size: .88rem; font-weight: 700; }
    .nav-links a:hover { color: white; }
    .hero { min-height: 480px; display: grid; align-items: center; grid-template-columns: 1.15fr .85fr; gap: 48px; padding: 68px 0 88px; }
    .eyebrow { display: flex; align-items: center; gap: 9px; color: #d8b4fe; font-size: .75rem; font-weight: 800; text-transform: uppercase; letter-spacing: .18em; }
    .eyebrow::before { content: ""; width: 26px; height: 1px; background: var(--purple); }
    h1 { max-width: 730px; margin: 15px 0 20px; font-size: clamp(3.15rem, 8vw, 6.7rem); line-height: .88; letter-spacing: -.075em; }
    h1 em { color: #d8b4fe; font-style: normal; text-shadow: 0 0 36px #a855f755; }
    .intro { max-width: 590px; margin: 0; color: var(--muted); font-size: clamp(1rem, 2vw, 1.14rem); line-height: 1.75; }
    .button { display: inline-flex; align-items: center; gap: 10px; margin-top: 29px; padding: 14px 20px; border: 1px solid #d8b4fe66; border-radius: 999px; color: white; background: linear-gradient(120deg, #7e22ce, #4c1d95); font-weight: 800; box-shadow: 0 12px 35px #7e22ce40; transition: transform .2s, box-shadow .2s; }
    .button:hover { transform: translateY(-2px); box-shadow: 0 18px 40px #7e22ce66; }
    .dragon-orb { position: relative; width: min(100%, 355px); aspect-ratio: 1; justify-self: end; overflow: hidden; border: 1px solid #d8b4fe44; border-radius: 50%; background: radial-gradient(circle at 37% 28%, #b05cff 0 2%, #4c176f 23%, #180727 54%, #07030c 71%); box-shadow: inset 0 0 60px #000, 0 0 90px #6d28d966; }
    .dragon-orb::before { content: ""; position: absolute; inset: 10%; border: 1px solid #f3e8ff44; border-radius: 50%; }
    .dragon-orb::after { content: ""; position: absolute; width: 170%; height: 37%; left: -30%; top: 42%; border-radius: 50%; border-top: 16px solid #050207; transform: rotate(-18deg); box-shadow: 0 -5px 12px #a855f744; }
    .orb-eye { position: absolute; top: 33%; left: 54%; width: 21px; height: 11px; border-radius: 80% 15%; background: #d8b4fe; transform: rotate(-15deg); box-shadow: 0 0 18px #e9d5ff; }
    .orb-eye::after { content: ""; position: absolute; inset: 2px 7px; background: #190622; border-radius: 50%; }
    section { padding: 20px 0 80px; }
    .section-heading { display: flex; justify-content: space-between; align-items: end; gap: 22px; margin-bottom: 27px; }
    .section-heading h2 { margin: 0; font-size: clamp(2rem, 4vw, 3.5rem); letter-spacing: -.06em; }
    .section-heading p { max-width: 310px; margin: 0; color: var(--muted); font-size: .92rem; line-height: 1.55; }
    .video-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; }
    .video-card { overflow: hidden; border: 1px solid #d8b4fe24; border-radius: 20px; background: linear-gradient(145deg, #1d0d2bcc, #0d0615e6); box-shadow: 0 16px 45px #00000038; transition: border-color .2s, transform .2s; }
    .video-card:hover { transform: translateY(-4px); border-color: #d8b4fe88; }
    .video-wrap { position: relative; aspect-ratio: 16 / 9; background: #030105; }
    video { display: block; width: 100%; height: 100%; object-fit: cover; }
    .video-fallback { display: grid; place-items: center; width: 100%; height: 100%; color: #d8b4fe; text-align: center; padding: 20px; background: radial-gradient(circle at 50% 20%, #6d28d966, transparent 45%), #08030f; }
    .card-content { padding: 20px; }
    .tag { color: #e9d5ff; font-size: .7rem; font-weight: 800; letter-spacing: .13em; text-transform: uppercase; }
    h3 { margin: 8px 0 8px; font-size: 1.32rem; letter-spacing: -.035em; }
    .card-content p { margin: 0; color: var(--muted); line-height: 1.6; font-size: .92rem; }
    .footer { border-top: 1px solid #d8b4fe1f; padding: 30px 0 42px; color: #9f8cb3; font-size: .83rem; }
    @media (max-width: 720px) { .nav-links { gap: 14px; font-size: .76rem; } .hero { grid-template-columns: 1fr; padding-top: 45px; gap: 38px; } .dragon-orb { justify-self: start; width: 230px; grid-row: 1; } .section-heading { align-items: start; flex-direction: column; } .video-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="shell nav">
    <a class="brand" href="#inicio">NIGHT<span>FURY</span></a>
    <nav class="nav-links" aria-label="Navegação principal"><a href="#videos">Vídeos</a><a href="#contato">Contato</a></nav>
  </header>
  <main>
    <div id="inicio" class="shell hero">
      <div>
        <div class="eyebrow">Portfólio de vídeos</div>
        <h1>Ideias que <em>ganham asas.</em></h1>
        <p id="hero-text" class="intro"></p>
        <a class="button" href="#videos">Explorar vídeos <span aria-hidden="true">↓</span></a>
      </div>
      <div class="dragon-orb" aria-hidden="true"><i class="orb-eye"></i></div>
    </div>
    <section id="videos" class="shell">
      <div class="section-heading"><div><div class="eyebrow">Seleção</div><h2>Meus vídeos</h2></div><p>Projetos selecionados, apresentados em uma experiência inspirada no voo noturno de um Fúria da Noite.</p></div>
      <div id="video-grid" class="video-grid"></div>
    </section>
  </main>
  <footer id="contato" class="footer"><div class="shell">© <span id="year"></span> <span id="footer-name"></span> — Portfólio de vídeos.</div></footer>
  <script>
    /* EDITE SOMENTE ESTA ÁREA PARA PERSONALIZAR O PORTFÓLIO. */
    const portfolioConfig = {
      name: "UN6107617",
      intro: "Uma coleção de trabalhos em vídeo, com foco em narrativa, ritmo e experiências digitais marcantes.",
      videos: [
        { title: "Seu primeiro vídeo", category: "Projeto em destaque", description: "Descreva aqui o objetivo, sua participação e o resultado deste vídeo.", src: "videos/primeiro-video.mp4", poster: "" },
        { title: "Seu segundo vídeo", category: "Conteúdo criativo", description: "Troque este exemplo por um novo vídeo e uma descrição curta do projeto.", src: "videos/segundo-video.mp4", poster: "" },
        { title: "Seu terceiro vídeo", category: "Campanha", description: "Use arquivos MP4 hospedados neste repositório ou URLs HTTPS públicas.", src: "videos/terceiro-video.mp4", poster: "" },
        { title: "Seu quarto vídeo", category: "Bastidores", description: "Cada item da lista gera automaticamente um card de vídeo no portfólio.", src: "videos/quarto-video.mp4", poster: "" }
      ]
    };

    const escapeHtml = (value) => String(value).replace(/[&<>'"]/g, (character) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' })[character]);
    function renderVideos() {
      document.title = `${portfolioConfig.name} | Portfólio de Vídeos`;
      document.getElementById('hero-text').textContent = portfolioConfig.intro;
      document.getElementById('footer-name').textContent = portfolioConfig.name;
      document.getElementById('year').textContent = new Date().getFullYear();
      document.getElementById('video-grid').innerHTML = portfolioConfig.videos.map((video) => {
        const poster = video.poster ? ` poster="${escapeHtml(video.poster)}"` : '';
        const player = video.src
          ? `<video controls preload="metadata"${poster}><source src="${escapeHtml(video.src)}" type="video/mp4">Seu navegador não suporta vídeo HTML5.</video>`
          : '<div class="video-fallback">Adicione uma URL ou arquivo MP4 em <code>src</code>.</div>';
        return `<article class="video-card"><div class="video-wrap">${player}</div><div class="card-content"><div class="tag">${escapeHtml(video.category)}</div><h3>${escapeHtml(video.title)}</h3><p>${escapeHtml(video.description)}</p></div></article>`;
      }).join('');
    }
    renderVideos();
  </script>
</body>
</html>
